<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releases | Redemption Road MG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-orange: #FF9F1C; --neon-orange-light: #FFB347; --dark-bg: #0a0a0a; --dark-bg-secondary: #141414; --dark-bg-tertiary: #1a1a1a; --text-primary: #ffffff; --text-secondary: #a0a0a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: var(--text-primary); }
        h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
        
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 1rem 2rem; background: rgba(10, 10, 10, 0.98); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--neon-orange); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--text-primary); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-orange); }
        
        main { padding: 120px 2rem 4rem; max-width: 1200px; margin: 0 auto; }
        .page-header { text-align: center; margin-bottom: 4rem; }
        .page-header h1 { font-size: clamp(3rem, 8vw, 6rem); color: var(--neon-orange); }
        
        .release-type { margin-bottom: 3rem; }
        .release-type h2 { font-size: 2rem; margin-bottom: 1.5rem; color: var(--neon-orange); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        
        .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; }
        .release-card { background: var(--dark-bg-secondary); border-radius: 15px; overflow: hidden; transition: all 0.3s; }
        .release-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .release-art { height: 250px; background: var(--dark-bg-tertiary); background-size: cover; background-position: center; }
        .release-info { padding: 1.5rem; }
        .release-title { font-size: 1.2rem; margin-bottom: 0.3rem; }
        .release-artist { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .release-date { color: var(--neon-orange); font-size: 0.8rem; }
        .release-links { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .release-links a { padding: 0.5rem 1rem; background: var(--dark-bg-tertiary); border-radius: 5px; color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; transition: all 0.3s; }
        .release-links a:hover { background: var(--neon-orange); color: var(--dark-bg); }
        
        footer { padding: 3rem 2rem; background: var(--dark-bg-secondary); text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 4rem; }
        
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">REDEMPTION ROAD MG</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="marketing.html">Marketing</a></li>
                <li><a href="artists.html">Artists</a></li>
                <li><a href="releases.html" class="active">Releases</a></li>
                <li><a href="contacts.html">Contacts</a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        <div class="page-header">
            <h1>RELEASES</h1>
            <p style="color: var(--text-secondary);">Music releases and distribution</p>
        </div>
        
        <div class="release-type">
            <h2>SINGLES</h2>
            <div class="releases-grid" id="singles-grid">
                <!-- Dynamically loaded from tracks.js -->
            </div>
        </div>
        
        <div class="release-type">
            <h2>ALBUMS</h2>
            <div class="releases-grid">
                <div class="release-card">
                    <div class="release-art" style="background: linear-gradient(135deg, #1a1a1a, #2a2a2a); display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-compact-disc" style="font-size: 4rem; color: var(--neon-orange); opacity: 0.5;"></i>
                    </div>
                    <div class="release-info">
                        <h3 class="release-title">Coming Soon</h3>
                        <p class="release-artist">Various Artists</p>
                        <p class="release-date">TBA 2024</p>
                        <div class="release-links">
                            <a href="#"><i class="fab fa-spotify"></i></a>
                            <a href="#"><i class="fab fa-apple"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 3rem;">
            <a href="#" style="padding: 1rem 3rem; background: var(--neon-orange); color: var(--dark-bg); text-decoration: none; font-weight: 700; border-radius: 5px;">
                <i class="fas fa-plus"></i> Add New Release
            </a>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2024 Redemption Road MG | Redemption Road Records</p>
    </footer>
    
    <script>
        async function loadReleases() {
            try {
                const response = await fetch('tracks.js');
                const jsCode = await response.text();
                const script = document.createElement('script');
                script.textContent = jsCode;
                document.head.appendChild(script);
                const tracks = window.track || [];
                
                const grid = document.getElementById('singles-grid');
                grid.innerHTML = tracks.map(track => `
                    <div class="release-card">
                        <div class="release-art" style="background: linear-gradient(135deg, #1a1a1a, #2a2a2a); display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-music" style="font-size: 3rem; color: var(--neon-orange); opacity: 0.5;"></i>
                        </div>
                        <div class="release-info">
                            <h3 class="release-title">${track.title}</h3>
                            <p class="release-artist">${track.artist}</p>
                            <p class="release-date">${track.time}</p>
                            <div class="release-links">
                                <a href="${track.src}"><i class="fab fa-spotify"></i></a>
                                <a href="${track.src}"><i class="fab fa-apple"></i></a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.log('Could not load releases:', e); }
        }
        loadReleases();
    </script>
</body>
</html>
